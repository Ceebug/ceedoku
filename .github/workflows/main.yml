name: Sync website

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout game repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ceedoku/ceedoku.github.io
          token: ${{ secrets.sync }}
          path: website
          fetch-depth: 0

      - name: Copy game files
        run: |
          cp -r index.html script.js style.css touch.css sw.js manifest.json code.md website confetticode.js website/
          cp -r sounds website/
          cp -r icons website/
      - name: Create sync commit
        run: |
          cd website

          git config user.name "Ceebot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *

          CHANGES=$(git diff --cached --name-only)

          if [ -z "$CHANGES" ]; then
            echo "No changes to sync"
            exit 0
          fi

          MESSAGE="Sync game from Ceedoku"$'\n\n'"Synced:"$'\n'

          while IFS= read -r file; do
            MESSAGE="$MESSAGE- $file"$'\n'
          done <<< "$CHANGES"

          git commit -m "$MESSAGE"

          git push
