name: Sync website

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout game repo
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: ceedoku/ceedoku.github.io
          token: ${{ secrets.GITHUB_TOKEN }}
          path: website

      - name: Copy game files
        run: |
          cp index.html script.js style.css manifest.json icon.png website/

      - name: Create sync commit
        run: |
          cd website

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          CHANGES=$(git diff --cached --name-only)

          if [ -z "$CHANGES" ]; then
            echo "No changes"
            exit 0
          fi

          MESSAGE="Sync game from Ceedoku\n\nSynced:\n"

          while IFS= read -r file; do
            MESSAGE="$MESSAGE- $file\n"
          done <<< "$CHANGES"

          git commit -m "$MESSAGE"

          git push
