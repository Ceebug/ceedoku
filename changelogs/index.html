  <title>Ceedoku - Changelogs</title><style>
:root {
    --surface: #171d24;
    --text: #dce3e9;
    --blue: #73a7ff;
    --shadow: 0 5px 48px rgba(0,0,0,.32);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
}


/* Title bar */

.titlebar {
    width: 100%;
    height: 80px;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: var(--surface);
    box-shadow: var(--shadow);
}

.logo {
    height: 60px;
}

.desktop-menu {
    margin-left: auto;
    display: flex;
    gap: 25px;
}

.desktop-menu a,
.mobile-sidebar a {
    color: var(--text);
    text-decoration: none;
}

.desktop-menu a:hover,
.mobile-sidebar a:hover {
    color: var(--blue);
}


/* Mobile button */

.menu-button {
    display: none;
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text);
    font-size: 32px;
    cursor: pointer;
}


/* Mobile sidebar */

.mobile-sidebar {
    position: fixed;
    top: 0;
    left: -280px;

    width: 280px;
    height: 100dvh;

    background: var(--surface);

    display: flex;
    flex-direction: column;
    gap: 20px;

    padding: 20px;

    transition: left .3s ease;

    z-index: 1000;
}

.mobile-sidebar.open {
    left: 0;
}
.sidebar-spacer {
    flex: 1;
}

.close-menu {
    background: none;
    border: 1px solid var(--text);
    color: var(--text);
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

.close-menu:hover {
    color: var(--blue);
}

.sidebar-logo {
    width: 200px;
    margin-bottom: 20px;
}
.menu-button {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 32px;
    cursor: pointer;
}
.why {
	margin-left: 10px;
	margin-right: 10px
}
#markdown-content {
	margin-left: 10px;
	margin-right: 10px
}


/* Mobile layout */

@media (max-width: 700px) {

    .titlebar {
        display: none;
    }

    .menu-button {
        display: block;
        position: absolute;
        top: 10px;
        left: 15px;
        z-index: 999;
		margin-top: 8px
        margin: 0;
        padding: 0;
    }


    .img {
	width: 80%;
	transform: translatex(20vw);
	margin-top: 5px
    }}</style>

</div><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script>
fetch("https://raw.githubusercontent.com/ceedoku/ceedoku.github.io/refs/heads/main/changelog/Changelogs.md")
    .then(response => {
        if (!response.ok) {
            throw new Error("Markdown file not found");
        }
        return response.text();
    })
    .then(markdown => {
        document.getElementById("markdown-content").innerHTML =
            marked.parse(markdown);
    })
    .catch(error => {
        document.getElementById("markdown-content").textContent =
            error.message;
    });
</script>
<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
}


document.addEventListener("click", function(event) {

    const sidebar = document.getElementById("sidebar");
    const button = document.querySelector(".menu-button");

    if (
        sidebar.classList.contains("open") &&
        !sidebar.contains(event.target) &&
        !button.contains(event.target)
    ) {
        sidebar.classList.remove("open");
    }

});
</script></body></html>
